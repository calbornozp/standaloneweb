document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"font-family:'Hanken Grotesk',monospace;font-size:.7rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(40,70,57,.5)\">[ Retrato · líder de equipo ]<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',monospace;font-size:.62rem;letter-spacing:.1em;color:rgba(40,70,57,.4)\">reemplazar con foto institucional<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:-22px;bottom:30px;background:var(--green);color:#fff;border-radius:14px;padding:20px 22px;width:230px;box-shadow:0 18px 44px -18px rgba(22,36,29,.6)\">\n        <div style=\"font-size:.64rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px\">Respaldo institucional<\u002Fdiv>\n        <div style=\"display:flex;gap:18px\">\n          <div><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.8rem;line-height:1\">PhD<\u002Fdiv><div style=\"font-size:.66rem;color:rgba(255,255,255,.7);line-height:1.35;margin-top:3px\">Docentes investigadores<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:rgba(255,255,255,.18)\"><\u002Fdiv>\n          <div><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.8rem;line-height:1\">ISO<\u002Fdiv><div style=\"font-size:.66rem;color:rgba(255,255,255,.7);line-height:1.35;margin-top:3px\">Procesos certificados<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fsc-if>\n\n<!-- ===================== HERO · STATEMENT ===================== -->\n<sc-if value=\"{{ heroStatement }}\" hint-placeholder-val=\"{{ false }}\">\n<section data-screen-label=\"Hero\" style=\"background:var(--green);color:#fff;position:relative;overflow:hidden\">\n  <div style=\"position:absolute;top:-160px;left:50%;transform:translateX(-50%);width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,rgba(13,177,75,.14) 0%,transparent 62%);pointer-events:none\"><\u002Fdiv>\n  <div style=\"max-width:920px;margin:0 auto;padding:168px 40px 30px;text-align:center;position:relative;z-index:2\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:6px 15px;font-size:.7rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:#fff;margin-bottom:30px\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Formación de liderazgo · Presencia en todo Chile\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(2.7rem,5.2vw,4.6rem);line-height:1.07;letter-spacing:-.015em\">Sus mandos medios deciden si la estrategia <em style=\"font-style:italic;color:var(--vivid)\">se ejecuta o se pierde<\u002Fem><\u002Fh1>\n      <p style=\"font-size:1.12rem;color:rgba(255,255,255,.82);max-width:600px;margin:28px auto 36px;line-height:1.75\">Formamos a las jefaturas intermedias que sostienen su operación — con rigor académico, franquicia tributaria SENCE y resultados medibles.<\u002Fp>\n      <div style=\"display:flex;gap:12px;flex-wrap:wrap;justify-content:center\">\n        <a href=\"#contacto\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--vivid);color:#fff;font-weight:700;font-size:.92rem;padding:15px 30px;border-radius:9px\">Solicitar propuesta\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#servicios\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);color:#fff;font-weight:700;font-size:.92rem;padding:15px 28px;border-radius:9px;border:1px solid rgba(255,255,255,.25)\">Ver catálogo<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;max-width:1180px;margin:0 auto;padding:0 40px 0\">\n    <div style=\"aspect-ratio:21/7;border-radius:18px 18px 0 0;overflow:hidden;background:repeating-linear-gradient(135deg,#22382c 0 14px,#2b4537 14px 28px);position:relative;border:1px solid rgba(255,255,255,.1);border-bottom:none;display:flex;align-items:center;justify-content:center\">\n      <span style=\"font-family:'Hanken Grotesk',monospace;font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45)\">[ Imagen institucional · equipo en formación ]<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fsc-if>\n\n<!-- ===================== TRUST STRIP ===================== -->\n<div style=\"background:var(--green-deep);color:#fff\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:30px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px\">\n    <div style=\"display:flex;align-items:baseline;gap:11px\"><span style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.85rem;line-height:1\">30+<\u002Fspan><span style=\"font-size:.76rem;color:rgba(255,255,255,.65);max-width:120px;line-height:1.4\">años de trayectoria institucional<\u002Fspan><\u002Fdiv>\n    <span style=\"width:1px;height:38px;background:rgba(255,255,255,.16)\"><\u002Fspan>\n    <div style=\"display:flex;align-items:baseline;gap:11px\"><span style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.85rem;line-height:1\">PhD<\u002Fspan><span style=\"font-size:.76rem;color:rgba(255,255,255,.65);max-width:120px;line-height:1.4\">docentes con grado académico<\u002Fspan><\u002Fdiv>\n    <span style=\"width:1px;height:38px;background:rgba(255,255,255,.16)\"><\u002Fspan>\n    <div style=\"display:flex;align-items:baseline;gap:11px\"><span style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.85rem;line-height:1\">ISO<\u002Fspan><span style=\"font-size:.76rem;color:rgba(255,255,255,.65);max-width:120px;line-height:1.4\">gestión certificada por norma<\u002Fspan><\u002Fdiv>\n    <span style=\"width:1px;height:38px;background:rgba(255,255,255,.16)\"><\u002Fspan>\n    <div style=\"display:flex;align-items:baseline;gap:11px\"><span style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.85rem;line-height:1\">Chile<\u002Fspan><span style=\"font-size:.76rem;color:rgba(255,255,255,.65);max-width:130px;line-height:1.4\">red nacional de sedes operativas<\u002Fspan><\u002Fdiv>\n    <span style=\"width:1px;height:38px;background:rgba(255,255,255,.16)\"><\u002Fspan>\n    <div style=\"display:flex;align-items:baseline;gap:11px\"><span style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.85rem;line-height:1\">SENCE<\u002Fspan><span style=\"font-size:.76rem;color:rgba(255,255,255,.65);max-width:130px;line-height:1.4\">franquicia tributaria disponible<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===================== EL DESAFÍO ===================== -->\n<section id=\"desafio\" data-screen-label=\"El desafío\" style=\"padding:104px 0;scroll-margin-top:80px\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-bottom:56px\">\n      <div>\n        <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">El eslabón más exigido<\u002Fdiv>\n        <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.9rem,3.3vw,2.7rem);color:var(--green);line-height:1.13\">El mando medio carga con todo y casi nadie lo prepara para eso<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:1.02rem;color:var(--muted);line-height:1.8;padding-top:6px\">En Chile, los jefes intermedios son el eslabón más exigido y menos formado de cualquier organización. Responden ante gerencias exigentes, lideran equipos con bajo compromiso y operan en alta precariedad. Sin las herramientas adecuadas, el resultado es predecible: <strong style=\"color:var(--ink)\">tensión, rotación y resultados que no llegan<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <div data-reveal=\"\" data-reveal-delay=\"40\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:700;font-size:.95rem;color:var(--vivid);margin-bottom:14px\">↑ Desde arriba<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.12rem;color:var(--green);margin-bottom:10px;line-height:1.25\">Presión sin amortiguación<\u002Fh3>\n        <p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Gerencias con metas crecientes, cambios de prioridad constantes y poca tolerancia al error. El jefe intermedio absorbe toda la exigencia.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"80\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:700;font-size:.95rem;color:var(--vivid);margin-bottom:14px\">↓ Desde abajo<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.12rem;color:var(--green);margin-bottom:10px;line-height:1.25\">Tensión y desconexión<\u002Fh3>\n        <p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Equipos con bajo compromiso, brechas generacionales, alta rotación y demandas de bienestar que no saben cómo gestionar.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:700;font-size:.95rem;color:var(--vivid);margin-bottom:14px\">↻ Cambio<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.12rem;color:var(--green);margin-bottom:10px;line-height:1.25\">Transformación sin soporte<\u002Fh3>\n        <p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Digitalización acelerada, Ley Karin y adopción de IA — cambios que llegan sin tiempo ni acompañamiento para adaptarse.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:700;font-size:.95rem;color:var(--vivid);margin-bottom:14px\">◇ Autoeficacia<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.12rem;color:var(--green);margin-bottom:10px;line-height:1.25\">Confianza erosionada<\u002Fh3>\n        <p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Muchos líderes cargan un historial de sacrificio y escasez. No necesitan más teoría: necesitan acompañamiento genuino.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:700;font-size:.95rem;color:var(--vivid);margin-bottom:14px\">▦ Formación<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.12rem;color:var(--green);margin-bottom:10px;line-height:1.25\">Cursos que no conectan<\u002Fh3>\n        <p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Los programas genéricos hablan de liderazgo en abstracto. El mando medio necesita mensajes simples, breves y aplicables hoy.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--green);border-radius:14px;padding:28px 26px;display:flex;flex-direction:column;justify-content:space-between;gap:24px\">\n        <p style=\"font-family:'Spectral',serif;font-style:italic;font-size:1.12rem;color:rgba(255,255,255,.92);line-height:1.55\">«Las organizaciones invierten en sus ejecutivos y en sus operarios. El mando medio queda en el medio de nadie.»<\u002Fp>\n        <a href=\"#servicios\" style=\"display:inline-block;font-size:.85rem;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,.35);border-radius:8px;padding:11px 18px;width:fit-content\">Ver cómo lo resolvemos →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== LÍNEAS ===================== -->\n<section id=\"servicios\" data-screen-label=\"Líneas de trabajo\" style=\"padding:104px 0;background:var(--paper2);border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);scroll-margin-top:70px\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;max-width:700px;margin-bottom:52px\">\n      <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">Áreas de especialidad<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.9rem,3.3vw,2.7rem);color:var(--green);line-height:1.13\">Tres líneas integradas. Un sistema completo de desarrollo.<\u002Fh2>\n      <p style=\"font-size:1rem;color:var(--muted);line-height:1.75;margin-top:16px\">Cada línea responde a una dimensión crítica del liderazgo en organizaciones chilenas. Se contratan de forma independiente o como sistema integrado.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <div data-reveal=\"\" data-reveal-delay=\"40\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column\">\n        <div style=\"padding:30px 28px 26px;background:linear-gradient(150deg,#284639,#16291F);position:relative\">\n          <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:3.4rem;line-height:1;color:rgba(255,255,255,.1);position:absolute;top:14px;right:22px\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.22rem;color:#fff;margin-bottom:12px\">Productividad y Cumplimiento de Normas<\u002Fh3>\n          <p style=\"font-size:.85rem;color:rgba(255,255,255,.72);line-height:1.55\">Claridad de roles, estructuras que funcionan y líderes que comprometen.<\u002Fp>\n          <div style=\"width:42px;height:3px;background:var(--vivid);border-radius:2px;margin-top:20px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px 28px;flex:1\">\n          <ul style=\"display:flex;flex-direction:column;gap:10px\">\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>DS44 <strong>Ley 16.744</strong><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"110\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column\">\n        <div style=\"padding:30px 28px 26px;background:linear-gradient(150deg,#1B4536,#0F2D22);position:relative\">\n          <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:3.4rem;line-height:1;color:rgba(255,255,255,.1);position:absolute;top:14px;right:22px\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.22rem;color:#fff;margin-bottom:12px\">Salud Mental Organizacional<\u002Fh3>\n          <p style=\"font-size:.85rem;color:rgba(255,255,255,.72);line-height:1.55\">Bienestar real que reduce conflictos y retiene a las personas clave.<\u002Fp>\n          <div style=\"width:42px;height:3px;background:var(--vivid);border-radius:2px;margin-top:20px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px 28px;flex:1\">\n          <ul style=\"display:flex;flex-direction:column;gap:10px\">\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Regulación emocional y gestión del estrés<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Burnout, identidad laboral y autoestima<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Ley Karin y riesgos psicosociales<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Gestión de conflictos y negociación<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Diversidad intergeneracional<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Conciliación trabajo-familia<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column\">\n        <div style=\"padding:30px 28px 26px;background:linear-gradient(150deg,#1E3D2F,#284639);position:relative\">\n          <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:3.4rem;line-height:1;color:rgba(255,255,255,.1);position:absolute;top:14px;right:22px\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.22rem;color:#fff;margin-bottom:12px\">Innovación y Digitalización<\u002Fh3>\n          <p style=\"font-size:.85rem;color:rgba(255,255,255,.72);line-height:1.55\">Líderes que adoptan la IA sin perder el equipo en el camino.<\u002Fp>\n          <div style=\"width:42px;height:3px;background:var(--vivid);border-radius:2px;margin-top:20px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px 28px;flex:1\">\n          <ul style=\"display:flex;flex-direction:column;gap:10px\">\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Adopción acelerada de IA<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Digitalización de procesos<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Gobierno y protección de datos<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Alineamiento estratégico de jefaturas<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Modelos predictivos aplicados<\u002Fli>\n            <li style=\"font-size:.86rem;color:var(--muted);padding-left:16px;position:relative\"><span style=\"position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--vivid)\"><\u002Fspan>Gestión de sistemas informativos<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;margin-top:24px;background:var(--mist);border:1px solid var(--line);border-left:4px solid var(--vivid);border-radius:12px;padding:22px 26px;display:flex;align-items:flex-start;gap:14px\">\n      <span style=\"font-family:'Spectral',serif;font-weight:800;color:var(--vivid);font-size:1.1rem;line-height:1.3\">+<\u002Fspan>\n      <p style=\"font-size:.92rem;color:var(--muted);line-height:1.65\">Las tres líneas comparten un mismo marco metodológico basado en evidencia científica y pueden entregarse de forma modular, híbrida o como <strong style=\"color:var(--ink)\">diploma cerrado de 120 horas in-company<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CATÁLOGO ===================== -->\n<section data-screen-label=\"Catálogo\" style=\"padding:104px 0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;max-width:660px;margin-bottom:52px\">\n      <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">Catálogo de servicios<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.9rem,3.3vw,2.7rem);color:var(--green);line-height:1.13\">Soluciones para cada necesidad y presupuesto<\u002Fh2>\n      <p style=\"font-size:1rem;color:var(--muted);line-height:1.75;margin-top:14px\">Formatos flexibles que se adaptan a su organización. Todos financiables mediante franquicia tributaria SENCE.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <div data-reveal=\"\" data-reveal-delay=\"40\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 26px -14px rgba(22,36,29,.28)\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Programa<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Liderazgo efectivo para mandos medios<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Formación intensiva híbrida para jefes intermedios que necesitan herramientas prácticas sin detener su operación. Personalizada por industria.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">30 horas<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Híbrido<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Móvil / Moodle<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"80\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1.5px solid var(--green);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;position:relative;box-shadow:0 14px 36px -16px rgba(22,36,29,.4)\">\n        <span style=\"position:absolute;top:-12px;left:24px;background:var(--vivid);color:#fff;font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 13px;border-radius:20px\">Más solicitado<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Plan<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Plan de fortalecimiento de equipos<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Intervención de tres meses que combina diagnóstico de clima, formación modular y acompañamiento continuo. Incluye medición de impacto al cierre.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">90 días<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Equipos<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Con medición<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 26px -14px rgba(22,36,29,.28)\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Diploma<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Diploma cerrado in-company<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Alto impacto con diseño curricular a medida. Certificación académica institucional, docentes PhD y metodología basada en evidencia científica.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">120 horas<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">In-company<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Certificado UST<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 26px -14px rgba(22,36,29,.28)\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Evaluación<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Evaluación de perfiles de liderazgo<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Diagnóstico individual o grupal de competencias con informe ejecutivo y plan de desarrollo. Clave para selección interna, promoción y sucesión.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Individual o grupal<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Informe ejecutivo<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 26px -14px rgba(22,36,29,.28)\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Evaluación<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Evaluación de clima organizacional<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Medición del clima con foco en las variables que predicen rendimiento, rotación y compromiso. Informe con hallazgos clave y recomendaciones accionables.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Clima laboral<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Recomendaciones<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 26px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 26px -14px rgba(22,36,29,.28)\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;flex:1\">\n          <span style=\"font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:var(--mist);border-radius:5px;padding:4px 10px;width:fit-content\">Coaching<\u002Fspan>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.1rem;color:var(--green);line-height:1.25\">Acompañamiento y coaching ejecutivo<\u002Fh3>\n          <p style=\"font-size:.87rem;color:var(--muted);line-height:1.6\">Proceso personalizado orientado a resultados concretos de negocio. Sesiones con consultor especializado en psicología organizacional.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Individual<\u002Fspan>\n          <span style=\"background:rgba(40,70,57,.07);border-radius:20px;padding:4px 11px;font-size:.74rem;font-weight:600;color:var(--green)\">Orientado a resultados<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"font-size:.82rem;font-weight:700;color:var(--vivid);padding-top:8px;border-top:1px solid var(--line2)\">Solicitar información →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;margin-top:24px;background:var(--green);border-radius:16px;padding:36px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap\">\n      <p style=\"font-family:'Spectral',serif;font-style:italic;font-size:1.18rem;color:rgba(255,255,255,.9);max-width:520px;line-height:1.5\">¿No encuentra el formato que necesita? Diseñamos propuestas a medida para cada organización.<\u002Fp>\n      <a href=\"#contacto\" style=\"background:var(--vivid);color:#fff;font-weight:700;font-size:.9rem;padding:14px 26px;border-radius:9px;white-space:nowrap\">Conversar con un especialista<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== METODOLOGÍA ===================== -->\n<section id=\"metodologia\" data-screen-label=\"Metodología\" style=\"padding:104px 0;background:var(--paper2);border-top:1px solid var(--line2);scroll-margin-top:70px\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease\">\n        <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">Cómo lo hacemos<\u002Fdiv>\n        <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.85rem,3vw,2.5rem);color:var(--green);line-height:1.14\">Aprendizaje construido desde el trabajo real, no desde el aula<\u002Fh2>\n        <div style=\"width:48px;height:3px;background:var(--vivid);border-radius:2px;margin:22px 0\"><\u002Fdiv>\n        <p style=\"font-size:.97rem;color:var(--muted);line-height:1.8;margin-bottom:36px\">No enseñamos liderazgo en abstracto. Partimos de los problemas concretos que el líder enfrenta hoy y los convertimos en el material pedagógico central del programa.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:18px;padding-bottom:26px;position:relative\">\n            <div style=\"position:absolute;left:17px;top:38px;bottom:0;width:2px;background:var(--line)\"><\u002Fdiv>\n            <div style=\"width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;z-index:1\">1<\u002Fdiv>\n            <div><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.04rem;color:var(--green);margin-bottom:6px\">Diagnóstico de quiebres operacionales<\u002Fh4><p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Identificamos las situaciones críticas reales del líder: conflictos, decisiones difíciles, brechas de rendimiento. Eso es el punto de partida.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:18px;padding-bottom:26px;position:relative\">\n            <div style=\"position:absolute;left:17px;top:38px;bottom:0;width:2px;background:var(--line)\"><\u002Fdiv>\n            <div style=\"width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;z-index:1\">2<\u002Fdiv>\n            <div><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.04rem;color:var(--green);margin-bottom:6px\">Micro-cápsulas desde el celular<\u002Fh4><p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Contenido breve, directo y disponible vía Moodle o móvil. El participante aprende a su ritmo, sin detener operaciones.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:18px;padding-bottom:26px;position:relative\">\n            <div style=\"position:absolute;left:17px;top:38px;bottom:0;width:2px;background:var(--line)\"><\u002Fdiv>\n            <div style=\"width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;z-index:1\">3<\u002Fdiv>\n            <div><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.04rem;color:var(--green);margin-bottom:6px\">Casos de la propia organización<\u002Fh4><p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Los reportes, tareas y situaciones reales del participante se usan como material. El aprendizaje se siente propio.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:18px;position:relative\">\n            <div style=\"width:36px;height:36px;border-radius:50%;background:var(--vivid);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;z-index:1\">4<\u002Fdiv>\n            <div><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.04rem;color:var(--green);margin-bottom:6px\">Marco teórico con estándar global<\u002Fh4><p style=\"font-size:.9rem;color:var(--muted);line-height:1.65\">Cada módulo se sustenta en investigación actualizada sobre liderazgo y psicología organizacional. Rigor aplicado a la realidad chilena.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease\">\n        <div style=\"background:var(--green);border-radius:18px;padding:34px 32px;color:#fff\">\n          <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:24px\">¿Por qué funciona con mandos medios?<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:22px\">\n            <div style=\"display:flex;gap:14px\"><span style=\"width:8px;height:8px;border-radius:2px;background:var(--vivid);margin-top:7px;flex-shrink:0\"><\u002Fspan><div><strong style=\"display:block;font-size:.98rem;margin-bottom:3px\">Conecta con el día a día<\u002Fstrong><span style=\"font-size:.86rem;color:rgba(255,255,255,.72);line-height:1.55\">Mensajes simples y directos, sin teoría y con aplicación inmediata.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:14px\"><span style=\"width:8px;height:8px;border-radius:2px;background:var(--vivid);margin-top:7px;flex-shrink:0\"><\u002Fspan><div><strong style=\"display:block;font-size:.98rem;margin-bottom:3px\">Eleva la autoeficacia<\u002Fstrong><span style=\"font-size:.86rem;color:rgba(255,255,255,.72);line-height:1.55\">Acompañamiento genuino que refuerza la confianza del líder en su criterio.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:14px\"><span style=\"width:8px;height:8px;border-radius:2px;background:var(--vivid);margin-top:7px;flex-shrink:0\"><\u002Fspan><div><strong style=\"display:block;font-size:.98rem;margin-bottom:3px\">Reduce la tensión operativa<\u002Fstrong><span style=\"font-size:.86rem;color:rgba(255,255,255,.72);line-height:1.55\">Herramientas concretas para gerentes exigentes, proveedores y equipos diversos.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:14px\"><span style=\"width:8px;height:8px;border-radius:2px;background:var(--vivid);margin-top:7px;flex-shrink:0\"><\u002Fspan><div><strong style=\"display:block;font-size:.98rem;margin-bottom:3px\">Cabe en cualquier agenda<\u002Fstrong><span style=\"font-size:.86rem;color:rgba(255,255,255,.72);line-height:1.55\">Formato híbrido y asincrónico. Aprende cuando puede, desde donde esté.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.16);display:flex;justify-content:space-between;text-align:center\">\n            <div><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.5rem\">25h<\u002Fdiv><div style=\"font-size:.66rem;color:rgba(255,255,255,.6);margin-top:2px\">asincrónicas<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,.16)\"><\u002Fdiv>\n            <div><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.5rem\">5h<\u002Fdiv><div style=\"font-size:.66rem;color:rgba(255,255,255,.6);margin-top:2px\">sincrónicas<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,.16)\"><\u002Fdiv>\n            <div><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.5rem\">100%<\u002Fdiv><div style=\"font-size:.66rem;color:rgba(255,255,255,.6);margin-top:2px\">casos reales<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Tech block -->\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;margin-top:64px;background:var(--green-deep);border-radius:20px;padding:48px 44px;color:#fff\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:40px\">\n        <div>\n          <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:14px\">Infraestructura tecnológica<\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(1.5rem,2.4vw,2rem);line-height:1.18\">Una plataforma de aprendizaje de nivel enterprise. Probada en más de 30 programas.<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size:.94rem;color:rgba(255,255,255,.72);line-height:1.7\">Integramos agentes automatizados, modelos de lenguaje e inteligencia artificial para ofrecer lo que ningún programa tradicional puede: retroalimentación personalizada a escala y monitoreo del aprendizaje en tiempo real.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px 22px\">\n          <div style=\"width:34px;height:34px;border-radius:8px;background:rgba(13,177,75,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><span style=\"width:12px;height:12px;border:2px solid var(--vivid);border-radius:3px\"><\u002Fspan><\u002Fdiv>\n          <h4 style=\"font-size:.98rem;font-weight:700;margin-bottom:8px;line-height:1.25\">Evaluación en contexto real<\u002Fh4>\n          <p style=\"font-size:.83rem;color:rgba(255,255,255,.66);line-height:1.55;margin-bottom:14px\">Análisis de casos y ejercicios aplicados al contexto real de la organización del participante.<\u002Fp>\n          <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.05em;color:var(--vivid);background:rgba(13,177,75,.12);border-radius:5px;padding:4px 9px\">Evaluación formativa<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px 22px\">\n          <div style=\"width:34px;height:34px;border-radius:8px;background:rgba(13,177,75,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><span style=\"width:14px;height:14px;border:2px solid var(--vivid);border-radius:50%\"><\u002Fspan><\u002Fdiv>\n          <h4 style=\"font-size:.98rem;font-weight:700;margin-bottom:8px;line-height:1.25\">Retroalimentación con IA<\u002Fh4>\n          <p style=\"font-size:.83rem;color:rgba(255,255,255,.66);line-height:1.55;margin-bottom:14px\">Agentes automatizados y modelos de lenguaje generan comentarios específicos para cada respuesta.<\u002Fp>\n          <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.05em;color:var(--vivid);background:rgba(13,177,75,.12);border-radius:5px;padding:4px 9px\">n8n · Vertex AI · LLMs<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px 22px\">\n          <div style=\"width:34px;height:34px;border-radius:8px;background:rgba(13,177,75,.2);display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:8px;margin-bottom:16px\"><span style=\"width:3px;height:8px;background:var(--vivid)\"><\u002Fspan><span style=\"width:3px;height:13px;background:var(--vivid)\"><\u002Fspan><span style=\"width:3px;height:5px;background:var(--vivid)\"><\u002Fspan><\u002Fdiv>\n          <h4 style=\"font-size:.98rem;font-weight:700;margin-bottom:8px;line-height:1.25\">Analytics en tiempo real<\u002Fh4>\n          <p style=\"font-size:.83rem;color:rgba(255,255,255,.66);line-height:1.55;margin-bottom:14px\">Paneles dinámicos con participación, avance y patrones de abandono. El cliente ve el progreso en vivo.<\u002Fp>\n          <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.05em;color:var(--vivid);background:rgba(13,177,75,.12);border-radius:5px;padding:4px 9px\">Looker Studio · LMS<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px 22px\">\n          <div style=\"width:34px;height:34px;border-radius:8px;background:rgba(13,177,75,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><span style=\"width:13px;height:13px;border:2px solid var(--vivid);border-radius:50%;position:relative\"><\u002Fspan><\u002Fdiv>\n          <h4 style=\"font-size:.98rem;font-weight:700;margin-bottom:8px;line-height:1.25\">Acompañamiento por datos<\u002Fh4>\n          <p style=\"font-size:.83rem;color:rgba(255,255,255,.66);line-height:1.55;margin-bottom:14px\">Detectamos dificultades temprano y contactamos a participantes con menor actividad. Retención activa.<\u002Fp>\n          <span style=\"font-size:.68rem;font-weight:600;letter-spacing:.05em;color:var(--vivid);background:rgba(13,177,75,.12);border-radius:5px;padding:4px 9px\">Monitoreo permanente<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== DIFERENCIADORES ===================== -->\n<section data-screen-label=\"Diferenciadores\" style=\"padding:104px 0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;max-width:640px;margin-bottom:52px\">\n      <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">Por qué elegirnos<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.9rem,3.3vw,2.7rem);color:var(--green);line-height:1.13\">Ventajas que ningún otro programa combina<\u002Fh2>\n      <p style=\"font-size:1rem;color:var(--muted);line-height:1.75;margin-top:14px\">No competimos por precio. Competimos por resultado. Estas son las razones por las que organizaciones en todo Chile confían en nosotros.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n      <div data-reveal=\"\" data-reveal-delay=\"30\" style=\"opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:26px 24px\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margin-bottom:14px\">01<\u002Fdiv><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.02rem;color:var(--green);margin-bottom:8px;line-height:1.25\">Rigor académico global<\u002Fh4><p style=\"font-size:.86rem;color:var(--muted);line-height:1.6\">La dirección académica de los programas es supervisada por académicos con doctorado, investigadores activos que traen evidencia actualizada.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"60\" style=\"opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:26px 24px\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margi var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:26px 24px\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margin-bottom:14px\">05<\u002Fdiv><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.02rem;color:var(--green);margin-bottom:8px;line-height:1.25\">Procesos certificados ISO<\u002Fh4><p style=\"font-size:.86rem;color:var(--muted);line-height:1.6\">Gestión bajo normas internacionales. Trazabilidad, cumplimiento y consistencia en cada programa.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:26px 24px\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margin-bottom:14px\">06<\u002Fdiv><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.02rem;color:var(--green);margin-bottom:8px;line-height:1.25\">Tecnología enterprise<\u002Fh4><p style=\"font-size:.86rem;color:var(--muted);line-height:1.6\">Plataforma propia con IA generativa y analytics. Lideramos la comisión de IA de RECLA Latam.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"210\" style=\"opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;background:var(--paper2);border:1px solid var(--line2);border-radius:14px;padding:26px 24px\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margin-bottom:14px\">07<\u002Fdiv><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.02rem;color:var(--green);margin-bottom:8px;line-height:1.25\">Equipos estables · 30 años<\u002Fh4><p style=\"font-size:.86rem;color:var(--muted);line-height:1.6\">No trabajamos con relatores de paso. Equipos que conocen el mercado chileno en profundidad.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;background:var(--green);border-radius:14px;padding:26px 24px;color:#fff\"><div style=\"font-family:'Spectral',serif;font-weight:700;font-size:1rem;color:var(--vivid);margin-bottom:14px\">08<\u002Fdiv><h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.02rem;margin-bottom:8px;line-height:1.25\">Velocidad de implementación<\u002Fh4><p style=\"font-size:.86rem;color:rgba(255,255,255,.72);line-height:1.6\">Capacidad operacional y financiera para responder rápido. De la propuesta al inicio, sin demoras.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== SEGMENTOS ===================== -->\n<section id=\"segmentos\" data-screen-label=\"Segmentos\" style=\"padding:104px 0;background:var(--paper2);border-top:1px solid var(--line2);scroll-margin-top:70px\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;max-width:640px;margin-bottom:40px\">\n      <div style=\"font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--vivid);margin-bottom:16px\">Para su organización<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(1.9rem,3.3vw,2.7rem);color:var(--green);line-height:1.13\">Una propuesta diseñada para su contexto<\u002Fh2>\n      <p style=\"font-size:1rem;color:var(--muted);line-height:1.75;margin-top:14px\">El mismo rigor académico, adaptado a las reglas del juego de cada sector.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap\">\n      <button onclick=\"{{ setEmpresa }}\" style=\"{{ tabStyleEmpresa }}\">Empresa privada<\u002Fbutt dding:28px 26px\">\n        <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:18px\">Oferta recomendada<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:22px\">\n          <div style=\"border-bottom:1px solid var(--line);padding-bottom:14px\"><div style=\"font-weight:700;font-size:.92rem;color:var(--green);margin-bottom:3px\">Programa Liderazgo Efectivo · 30h<\u002Fdiv><div style=\"font-size:.82rem;color:var(--muted);line-height:1.5\">Híbrido, franquicia SENCE, personalizado por industria<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-bottom:1px solid var(--line);padding-bottom:14px\"><div style=\"font-weight:700;font-size:.92rem;color:var(--green);margin-bottom:3px\">Plan de Fortalecimiento · 90 días<\u002Fdiv><div style=\"font-size:.82rem;color:var(--muted);line-height:1.5\">Diagnóstico + formación + medición con analytics<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:.92rem;color:var(--green);margin-bottom:3px\">Evaluación de Perfiles de Liderazgo<\u002Fdiv><div style=\"font-size:.82rem;color:var(--muted);line-height:1.5\">Para selección interna, sucesión y promoción<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#contacto\" style=\"display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;font-weight:700;font-size:.86rem;padding:13px 22px;border-radius:9px\">Solicitar propuesta para mi empresa\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ segPublico }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:40px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:40px;align-items:start\">\n      <div>\n        <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--vivid);margin-bottom:14px\">¿A quién va dirigido?<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.4rem;color:var(--green);line-height:1.25;margin-bottom:14px\">Jefes de servicio, encargados de capacitación y organismos del Estado<\u002Fh3>\n        <p style=\"font-size:.95rem;color:var(--muted);line-height:1.75;margin-bottom:22px\">El sector público enfrenta presiones únicas: alta demanda ciudadana, recursos acotados, brechas generacionales y normativas crecientes. Formamos líderes que navegan este contexto con herramientas reales.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"font-size:.9rem;color:var(--ink);font-weight:500\">→ Cumplir obligaciones de capacitación y PMG<\u002Fdiv>\n          <div style=\"font-size:.9rem;color:var(--ink);font-weight:500\">→ Abordar Ley Karin y riesgos psicosociales<\u002Fdiv>\n          <div style=\"font-size:.9rem;color:var(--ink);font-weight:500\">→ Fortalecer liderazgo bajo alta exigencia ciudadana<\u002Fdiv>\n          <div style=\"font-size:.9rem;color:var(--ink);font-weight:500\">→ Incorporar analítica como evidencia de impacto<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--mist);border-radius:14px;padding:28px 26px\">\n        <div style=\"font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:18px\">Oferta recomendada<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:22px\">\n          <div style=\"border-bottom:1px solid var(--line);padding-bottom:14px\"><div style=\"font-weight:700;font-size:.92rem;color:var(--green);margin-bottom:3px\">Programa Salud Mental Organizacional<\u002Fdiv><div style=\"font-size:. idth:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"width:10px;height:13px;border:1.5px solid var(--vivid);border-radius:50% 50% 50% 0;transform:rotate(45deg)\"><\u002Fspan><\u002Fspan><div style=\"line-height:1.3\"><span style=\"display:block;font-size:.72rem;color:rgba(255,255,255,.55)\">Cobertura<\u002Fspan><strong style=\"font-size:.98rem\">Presencia en todo Chile<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"130\" style=\"opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease\">\n        <div style=\"background:var(--paper2);color:var(--ink);border-radius:18px;padding:36px 34px\">\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:1.3rem;color:var(--green);margin-bottom:12px\">Solicite una reunión sin costo<\u002Fh3>\n          <p style=\"font-size:.95rem;color:var(--muted);line-height:1.7;margin-bottom:26px\">En 30 minutos le mostramos la plataforma, presentamos un programa ajustado a su realidad y respondemos todas sus preguntas.<\u002Fp>\n          <a href=\"mailto:calbornozp@santotomas.cl?subject=Solicito%20propuesta%20Centro%20de%20Liderazgo%20STEC\" style=\"display:flex;align-items:center;justify-content:center;gap:9px;background:var(--green);color:#fff;font-weight:700;font-size:.95rem;padding:16px;border-radius:10px;margin-bottom:24px\">Escribir ahora\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <span style=\"font-size:.74rem;font-weight:600;color:var(--green);background:var(--mist);border-radius:6px;padding:6px 11px\">✓ ISO Certificado<\u002Fspan>\n <div style=\"font-size:.74rem;color:rgba(255,255,255,.45)\">© 2026 Santo Tomás · ISO · SENCE · Chilevalora<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;heroVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;editorial&quot;,&quot;statement&quot;],&quot;default&quot;:&quot;editorial&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;palette&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;calido&quot;,&quot;institucional&quot;,&quot;contraste&quot;],&quot;default&quot;:&quot;calido&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  navRef = React.createRef();\n  state = { seg: 'empresa' };\n\n  palettes = {\n    calido: { '--ink':'#16241D','--green':'#284639','--green-deep':'#16291F','--vivid':'#0DB14B','--paper':'#F4F2EA','--paper2':'#FBFAF4','--card':'#FFFFFF','--sand':'#E9E3D5','--mist':'#E7F0EA','--line':'rgba(22,36,29,.12)','--line2':'rgba(22,36,29,.07)','--muted':'#566B60' },\n    institucional: { '--ink':'#181C18','--green':'#284639','--green-deep':'#16291F','--vivid':'#0DB14B','--paper':'#F6FAF7','--paper2':'#FFFFFF','--card':'#FFFFFF','--sand':'#E8F2EC','--mist':'#E8F2EC','--line':'rgba(40,70,57,.14)','--line2':'rgba(40,70,57,.08)','--muted':'#4B5563' },\n    contraste: { '--ink':'#0E1712','--green':'#1E3A2D','--green-deep':'#0F2419','--vivid':'#0A8F3C','--paper':'#FFFFFF','--paper2':'#F6F6F2','--card':'#FFFFFF','--sand':'#ECEAE2','--mist':'#EAF2EC','--line':'rgba(14,23,18,.16)','--line2':'rgba(14,23,18,.08)','--muted':'#3F4E45' }\n  };\n\n  getRoot() { return document.getElementById('stec-root'); }\n\n  applyPalette() {\n    const root = this.getRoot();\n    if (!root) return;\n    const p = this.palettes[this.props.palette] || this.palettes.calido;\n    Object.entries(p).forEach(([k, v]) => root.style.setProperty(k, v));\n  }\n\n  componentDidMount() {\n    this.applyPalette();\n    // Nav shadow on scroll\n    this._onScroll = () => {\n      const nav = document.getElementById('stec-nav');\n      if (!nav) return;\n      nav.style.boxShadow = window.scrollY > 30 ? '0 4px 28px rgba(22,36,29,.12)' : 'none';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentDidUpdate() { this.applyPalette(); }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._safety) clearTimeout(this._safety);\n  }\n\n  tabStyle(active) {\n    const base = 'font-size:.86rem;font-weight:600;padding:11px 20px;border-radius:9px;transition:all .2s;border:1px solid ';\n    return active\n      ? base + 'transparent;background:var(--green);color:#fff'\n      : base + 'var(--line);background:var(--card);color:var(--muted)';\n  }\n\n  renderVals() {\n    const seg = this.state.seg;\n    const variant = this.props.heroVariant || 'editorial';\n    return {\n      rootRef: this.rootRef,\n      navRef: this.navRef,\n      heroEditorial: variant === 'editorial',\n      heroStatement: variant === 'statement',\n      segEmpresa: seg === 'empresa',\n      segPublico: seg === 'publico',\n      segUni: seg === 'universidad',\n      tabStyleEmpresa: this.tabStyle(seg === 'empresa'),\n      tabStylePublico: this.tabStyle(seg === 'publico'),\n      tabStyleUni: this.tabStyle(seg === 'universidad'),\n      setEmpresa: () => this.setState({ seg: 'empresa' }),\n      setPublico: () => this.setState({ seg: 'publico' }),\n      setUni: () => this.setState({ seg: 'universidad' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Centro de Liderazgo STEC.dc"}
